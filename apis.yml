apis:
  - aid: unicamp:redu-dataverse-api
    name: REDU Dataverse Native & Search API
    description: >-
      REDU (Repositório de Dados de Pesquisa da Unicamp) is Unicamp's
      institutional research data repository running on Dataverse 6.0. It
      exposes the standard Dataverse REST API, including a public Search API
      (/api/search) and Native API endpoints for datasets, files, and metadata.
      Confirmed live: /api/info/version returns version 6.0 and the Search API
      returns 1,957 datasets. Datasets are minted with DataCite DOIs
      (doi:10.25824/redu/...).
    humanURL: https://redu.unicamp.br/
    baseURL: https://redu.unicamp.br/api
    tags: [ Research Data, Dataverse, Open Data, Datasets, Repository ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/6.0/api/
      - type: Documentation
        url: https://redu.unicamp.br/
  - aid: unicamp:redu-oai-pmh
    name: REDU OAI-PMH Metadata Endpoint
    description: >-
      OAI-PMH 2.0 metadata harvesting endpoint for REDU, the Unicamp Research
      Data Repository. Confirmed live: verb=Identify returns the repository
      "Repositório de Dados de Pesquisa da Unicamp Dataverse OAI Archive" with
      baseURL https://redu.unicamp.br/oai. Supports standard OAI-PMH verbs for
      harvesting dataset metadata.
    humanURL: https://redu.unicamp.br/
    baseURL: https://redu.unicamp.br/oai
    tags: [ OAI-PMH, Metadata Harvesting, Research Data, Repository ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/6.0/api/oai.html
