---
aid: unicamp
name: University of Campinas
description: >-
  The University of Campinas (Universidade Estadual de Campinas, Unicamp) is a
  public research university in Campinas, São Paulo, Brazil, ranked #232 in the
  QS World University Rankings 2025. Its most visible public, machine-readable
  API footprint is REDU, the Unicamp Research Data Repository, which runs on the
  open-source Dataverse 6.0 platform and exposes a documented Native/Search API
  and an OAI-PMH metadata endpoint. Institutional data products are otherwise
  delivered through dashboards and gated portals (EDAT / dados.unicamp.br) and
  library discovery systems rather than a unified public developer portal.
